<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал комплексних перевірок</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Додатковий CSS-захист від розрізання картки пункту навпіл */
        .style-pdf-block {
            page-break-inside: avoid !important;
            break-inside: avoid !important;
        }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] p-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border border-slate-100">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Журнал комплексних перевірок</h1>
                <p class="text-sm text-slate-500 mt-1">Всі збережені акти перевірок та виявлені порушення з бази Firebase</p>
            </div>
            <button id="btn-refresh" class="bg-[#1d4ed8] hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-xl transition duration-200 shadow-sm flex items-center justify-center space-x-2 shrink-0">
                <span>🔄 Оновити дані</span>
            </button>
        </div>

        <div id="reports-container" class="space-y-4">
            <div class="bg-white rounded-2xl p-12 text-center text-slate-400 border border-slate-100 shadow-sm animate-pulse">
                Завантаження журналу звітів з бази...
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5x6CnVTrySbKGlu7n1GOWrGKNO78sKJc",
            authDomain: "checklist-144ac.firebaseapp.com",
            projectId: "checklist-144ac",
            messagingSenderId: "32249871886",
            appId: "1:32249871886:web:951b7e7787f5418ef0465f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadReports() {
            const container = document.getElementById('reports-container');
            container.innerHTML = '<div class="bg-white rounded-2xl p-12 text-center text-slate-400 border border-slate-100 shadow-sm animate-pulse">Оновлення даних...</div>';

            try {
                const querySnapshot = await getDocs(collection(db, "submitted_reports"));

                if (querySnapshot.empty) {
                    container.innerHTML = `
                        <div class="bg-white rounded-2xl p-12 text-center text-slate-400 border border-slate-100 shadow-sm">
                            📭 Жодного звіту в базі даних ще не знайдено.
                        </div>`;
                    return;
                }

                const reportsArray = [];
                querySnapshot.forEach((doc) => {
                    reportsArray.push({ id: doc.id, ...doc.data() });
                });

                // Сортування: нові зверху
                reportsArray.sort((a, b) => {
                    const dateA = a.createdAt ? new Date(a.createdAt) : new Date(0);
                    const dateB = b.createdAt ? new Date(b.createdAt) : new Date(0);
                    return dateB - dateA;
                });

                container.innerHTML = '';

                reportsArray.forEach((report) => {
                    const docId = report.id;
                    
                    let reportDate = 'Невідома дата';
                    if (report.createdAt) {
                        const d = new Date(report.createdAt);
                        reportDate = d.toLocaleString('uk-UA', { 
                            day: '2-digit', month: '2-digit', year: 'numeric', 
                            hour: '2-digit', minute: '2-digit' 
                        });
                    }

                    const card = document.createElement('div');
                    card.id = `card-${docId}`;
                    card.className = "bg-white rounded-2xl shadow-[0_4px_15px_rgba(0,0,0,0.02)] border border-slate-100 overflow-hidden transition duration-200 hover:shadow-md";

                    const totalItems = report.totalItemsChecked || (report.records ? report.records.length : 0);
                    const inspectorName = report.inspectorName || 'Не вказано';

                    card.innerHTML = `
                        <div class="p-5 bg-white flex items-center justify-between cursor-pointer hover:bg-slate-50/50 transition duration-150 toggler-btn select-none">
                            <div class="space-y-1">
                                <div class="text-xs font-medium text-slate-400 tracking-wide">${reportDate}</div>
                                <div class="font-bold text-slate-800 text-base md:text-lg">Перевіряючий: <span class="text-[#1d4ed8]">${inspectorName}</span></div>
                            </div>
                            <div class="flex items-center space-x-3">
                                <span class="bg-[#eff6ff] text-[#1e40af] text-xs font-semibold px-2.5 py-1 rounded-lg border border-blue-100">Пунктів: ${totalItems}</span>
                                <span class="text-slate-400 text-xs arrow-icon transition-transform duration-200">▼</span>
                            </div>
                        </div>
                        
                        <div class="px-6 pb-6 hidden content-area border-t border-slate-50 pt-5 bg-white">
                            
                            <div id="pdf-area-${docId}" class="bg-white p-2" style="display: block; width: 100%;">
                                <div style="display: block; font-family: monospace; font-size: 11px; color: #94a3b8; margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px;">
                                    <span style="float: left;">ID: ${docId}</span>
                                    <span style="float: right;">Дата акту: ${reportDate}</span>
                                    <div style="clear: both;"></div>
                                </div>
                                
                                <h3 style="font-size: 18px; font-weight: bold; color: #1e293b; margin-top: 10px; margin-bottom: 10px; display: block;">Акт комплексного моніторингу</h3>
                                <p style="font-size: 14px; color: #334155; margin-bottom: 20px; display: block;"><strong>Перевіряючий:</strong> ${inspectorName}</p>
                                
                                <div class="block-records-container" style="display: block;"></div>
                            </div>

                            <div class="pt-5 mt-4 border-t border-slate-100 flex justify-end space-x-3">
                                <button data-id="${docId}" class="btn-pdf-report bg-[#eff6ff] hover:bg-blue-100 text-[#1e40af] border border-blue-200/60 text-xs font-bold px-4 py-2 rounded-xl transition duration-150 flex items-center space-x-1">
                                    <span>📥 Завантажити PDF</span>
                                </button>
                                <button data-id="${docId}" class="btn-delete-report bg-red-50 hover:bg-red-100 text-red-600 border border-red-100 text-xs font-bold px-4 py-2 rounded-xl transition duration-150 flex items-center space-x-1">
                                    <span>🗑️ Видалити звіт</span>
                                </button>
                            </div>
                        </div>
                    `;

                    const recordsContainer = card.querySelector('.block-records-container');

                    if (report.records && Array.isArray(report.records) && report.records.length > 0) {
                        report.records.forEach((record) => {
                            const itemRow = document.createElement('div');
                            itemRow.className = "style-pdf-block";
                            
                            itemRow.style.display = "block";
                            itemRow.style.borderLeft = "4px solid #f59e0b";
                            itemRow.style.backgroundColor = "#fffdfa";
                            itemRow.style.padding = "16px";
                            itemRow.style.borderRadius = "0 12px 12px 0";
                            itemRow.style.borderTop = "1px solid #f1f5f9";
                            itemRow.style.borderRight = "1px solid #f1f5f9";
                            itemRow.style.borderBottom = "1px solid #f1f5f9";
                            itemRow.style.marginBottom = "16px";
                            
                            itemRow.innerHTML = `
                                <h4 style="font-weight: bold; color: #1e293b; font-size: 14px; margin: 0 0 8px 0; display: block;">
                                    <span style="margin-right: 6px;">📌</span> 
                                    <span>${record.taskTitle || 'Пункт перевірки'}</span>
                                </h4>
                                ${record.comment ? `
                                    <div style="background-color: #ffffff; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px; color: #475569; white-space: pre-wrap; margin-top: 6px; display: block;">${record.comment}</div>
                                ` : '<p style="color: #94a3b8; font-size: 12px; font-style: italic; margin: 4px 0 0 0; display: block;">Без текстового коментаря</p>'}
                                ${record.photoUrl ? `
                                    <div style="margin-top: 12px; display: block; max-w-md;">
                                        <img src="${record.photoUrl}" crossOrigin="anonymous" alt="Фотофіксація" style="border-radius: 8px; max-height: 220px; object-fit: cover; border: 1px solid #cbd5e1; display: block;">
                                    </div>
                                ` : ''}
                            `;
                            recordsContainer.appendChild(itemRow);
                        });
                    } else {
                        recordsContainer.innerHTML = '<p style="color: #94a3b8; font-style: italic; font-size: 13px; display: block;">Детальні дані про порушення відсутні.</p>';
                    }

                    // Логіка аккордеону (відкриття/закриття)
                    const toggler = card.querySelector('.toggler-btn');
                    const content = card.querySelector('.content-area');
                    const arrow = card.querySelector('.arrow-icon');
                    
                    toggler.addEventListener('click', (e) => {
                        if (e.target.closest('button')) return;

                        if (content.classList.contains('hidden')) {
                            content.classList.remove('hidden');
                            arrow.innerText = '▲';
                            arrow.style.color = '#1d4ed8';
                        } else {
                            content.classList.add('hidden');
                            arrow.innerText = '▼';
                            arrow.style.color = '#94a3b8';
                        }
                    });

                    // Генерація багатосторінкового PDF
                    const pdfBtn = card.querySelector('.btn-pdf-report');
                    pdfBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        
                        const element = document.getElementById(`pdf-area-${docId}`);
                        const nameFile = `Zvit_${inspectorName.replace(/\s+/g, '_')}_${reportDate.split(',')[0].replace(/\./g, '_')}.pdf`;
                        
                        const opt = {
                            margin:       [15, 15, 15, 15],
                            filename:     nameFile,
                            image:        { type: 'jpeg', quality: 0.98 },
                            html2canvas:  { scale: 2, useCORS: true, logging: false },
                            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                            // Змінено 'before' на 'avoid', щоб пункти йшли щільним списком без порожніх сторінок
                            pagebreak:    { mode: ['css', 'legacy'], avoid: '.style-pdf-block' }
                        };

                        html2pdf().set(opt).from(element).save().catch(err => {
                            alert("Помилка генерації файлу: " + err.message);
                        });
                    });

                    // Функція видалення звіту
                    const deleteBtn = card.querySelector('.btn-delete-report');
                    deleteBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        
                        if (confirm(`Ви дійсно хочете видалити звіт від: ${inspectorName}?`)) {
                            e.currentTarget.innerText = "Видалення...";
                            e.currentTarget.disabled = true;
                            
                            try {
                                await deleteDoc(doc(db, "submitted_reports", docId));
                                document.getElementById(`card-${docId}`).remove();
                                alert("Звіт успішно видалено.");
                                
                                if (container.children.length === 0) {
                                    container.innerHTML = `<div class="bg-white rounded-2xl p-12 text-center text-slate-400 border border-slate-100 shadow-sm">📭 Жодного звіту не знайдено.</div>`;
                                }
                            } catch (err) {
                                alert("Помилка видалення: " + err.message);
                                e.currentTarget.innerText = "🗑️ Видалити звіт";
                                e.currentTarget.disabled = false;
                            }
                        }
                    });

                    container.appendChild(card);
                });

            } catch (error) {
                container.innerHTML = `
                    <div class="bg-red-50 border border-red-100 text-red-600 rounded-2xl p-5 text-center shadow-sm">
                        <strong class="block font-bold mb-1">Помилка завантаження бази даних!</strong>
                        <p class="text-xs font-mono">${error.message}</p>
                    </div>`;
            }
        }

        document.getElementById('btn-refresh').addEventListener('click', loadReports);
        loadReports();
    </script>
</body>
</html>
