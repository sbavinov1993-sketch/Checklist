<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал комплексних перевірок</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-white rounded-2xl shadow-sm p-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border border-slate-100">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight">Журнал комплексних перевірок</h1>
                <p class="text-sm text-slate-500 mt-1">Всі збережені акти перевірок та виявлені порушення з бази Firebase</p>
            </div>
            <button id="btn-refresh" class="bg-blue-600 hover:bg-blue-700 active:scale-98 text-white font-bold px-5 py-2.5 rounded-xl transition duration-200 shadow-sm shadow-blue-100 flex items-center justify-center space-x-2 shrink-0">
                <span>🔄 Оновити дані</span>
            </button>
        </div>

        <div id="reports-container" class="space-y-4">
            <div class="bg-white rounded-2xl p-12 text-center text-slate-400 border border-slate-100 shadow-sm animate-pulse">
                Завантаження журналу звітів з бази...
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5x6CnVTrySbKGlu7n1GOWrGKNO78sKJc",
            authDomain: "checklist-144ac.firebaseapp.com",
            projectId: "checklist-144ac",
            messagingSenderId: "32249871886",
            appId: "1:32249871886:web:951b7e7787f5418ef0465f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadReports() {
            const container = document.getElementById('reports-container');
            container.innerHTML = '<div class="bg-white rounded-2xl p-12 text-center text-slate-400 border border-slate-100 shadow-sm animate-pulse">Оновлення даних...</div>';

            try {
                const querySnapshot = await getDocs(collection(db, "submitted_reports"));

                if (querySnapshot.empty) {
                    container.innerHTML = `
                        <div class="bg-white rounded-2xl p-12 text-center text-slate-400 border border-slate-100 shadow-sm">
                            📭 Жодного звіту в базі даних ще не знайдено.
                        </div>`;
                    return;
                }

                const reportsArray = [];
                querySnapshot.forEach((doc) => {
                    reportsArray.push({ id: doc.id, ...doc.data() });
                });

                // Сортування від найновіших до найстаріших
                reportsArray.sort((a, b) => {
                    const dateA = a.createdAt ? new Date(a.createdAt) : new Date(0);
                    const dateB = b.createdAt ? new Date(b.createdAt) : new Date(0);
                    return dateB - dateA;
                });

                container.innerHTML = '';

                reportsArray.forEach((report) => {
                    const docId = report.id;
                    
                    let reportDate = 'Невідома дата';
                    if (report.createdAt) {
                        const d = new Date(report.createdAt);
                        reportDate = d.toLocaleString('uk-UA', { 
                            day: '2-digit', month: '2-digit', year: 'numeric', 
                            hour: '2-digit', minute: '2-digit' 
                        });
                    }

                    const card = document.createElement('div');
                    card.id = `card-${docId}`;
                    card.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden transition duration-200 hover:shadow-md";

                    const totalItems = report.totalItemsChecked || (report.records ? report.records.length : 0);
                    const inspectorName = report.inspectorName || 'Не вказано';

                    // Повністю твоя оригінальна структура картки зі збереженням стилістики
                    card.innerHTML = `
                        <div class="p-5 bg-white flex items-center justify-between cursor-pointer hover:bg-slate-50/80 transition duration-150 toggler-btn select-none">
                            <div class="space-y-1">
                                <div class="text-xs font-semibold text-slate-400 font-mono tracking-wider">${reportDate}</div>
                                <div class="font-bold text-slate-800 text-base md:text-lg">Перевіряючий: <span class="text-blue-600">${inspectorName}</span></div>
                            </div>
                            <div class="flex items-center space-x-4">
                                <span class="bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1 rounded-xl border border-blue-100">Пунктів: ${totalItems}</span>
                                <span class="text-slate-400 text-lg font-bold arrow-icon transition-transform duration-200">▼</span>
                            </div>
                        </div>
                        
                        <div class="px-6 pb-6 hidden content-area border-t border-slate-50 pt-5 space-y-5 bg-white">
                            
                            <div id="pdf-area-${docId}" class="space-y-5 bg-white p-1">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs font-mono text-slate-400 bg-slate-50/50 p-3 rounded-xl border border-slate-100">
                                    <div>ID акту: ${docId}</div>
                                    <div class="md:text-right">Системний маркер: ${report.createdAt || 'немає'}</div>
                                </div>
                                
                                <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 border-b border-slate-100 pb-2">Результати перевірки:</h3>
                                <div class="space-y-4 block-records-container"></div>
                            </div>

                            <div class="pt-4 border-t border-slate-100 flex justify-end space-x-3">
                                <button data-id="${docId}" class="btn-pdf-report bg-blue-50 hover:bg-blue-100 active:scale-98 text-blue-600 border border-blue-200/60 text-sm font-bold px-4 py-2 rounded-xl transition duration-150 flex items-center space-x-1">
                                    <span>📥 Завантажити PDF</span>
                                </button>
                                <button data-id="${docId}" class="btn-delete-report bg-red-50 hover:bg-red-100 active:scale-98 text-red-600 border border-red-200/60 text-sm font-bold px-4 py-2 rounded-xl transition duration-150 flex items-center space-x-1">
                                    <span>🗑️ Видалити цей звіт</span>
                                </button>
                            </div>
                        </div>
                    `;

                    const recordsContainer = card.querySelector('.block-records-container');

                    if (report.records && Array.isArray(report.records) && report.records.length > 0) {
                        report.records.forEach((record) => {
                            const itemRow = document.createElement('div');
                            itemRow.className = "border-l-4 border-amber-500 bg-amber-50/10 p-4 rounded-r-2xl space-y-2 border border-slate-100 mb-3 style-pdf-block";
                            
                            itemRow.innerHTML = `
                                <h4 class="font-bold text-slate-800 text-sm md:text-base flex items-start">
                                    <span class="mr-1.5 shrink-0">📌</span> 
                                    <span>${record.taskTitle || 'Пункт перевірки'}</span>
                                </h4>
                                ${record.comment ? `<p class="text-slate-600 text-sm whitespace-pre-wrap bg-white p-3 rounded-xl border border-slate-100 shadow-2xs">${record.comment}</p>` : '<p class="text-slate-400 text-xs italic pl-1">Без текстового коментаря</p>'}
                                ${record.photoUrl ? `
                                    <div class="mt-2 max-w-md">
                                        <img src="${record.photoUrl}" crossOrigin="anonymous" alt="Фотофіксація" class="rounded-xl max-h-64 object-cover border border-slate-200 shadow-2xs">
                                    </div>
                                ` : ''}
                            `;
                            recordsContainer.appendChild(itemRow);
                        });
                    } else {
                        recordsContainer.innerHTML = '<p class="text-slate-400 italic text-sm pl-1">Детальні дані відсутні.</p>';
                    }

                    // Логіка відкриття/закриття
                    const toggler = card.querySelector('.toggler-btn');
                    const content = card.querySelector('.content-area');
                    const arrow = card.querySelector('.arrow-icon');
                    
                    toggler.addEventListener('click', (e) => {
                        if (e.target.closest('button')) return; // Ігноруємо кліки по кнопках

                        if (content.classList.contains('hidden')) {
                            content.classList.remove('hidden');
                            arrow.innerText = '▲';
                            arrow.classList.remove('text-slate-400');
                            arrow.classList.add('text-blue-600');
                        } else {
                            content.classList.add('hidden');
                            arrow.innerText = '▼';
                            arrow.classList.remove('text-blue-600');
                            arrow.classList.add('text-slate-400');
                        }
                    });

                    // Автономна та безпечна генерація PDF
                    const pdfBtn = card.querySelector('.btn-pdf-report');
                    pdfBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        
                        const element = document.getElementById(`pdf-area-${docId}`);
                        const nameFile = `Zvit_${inspectorName.replace(/\s+/g, '_')}_${reportDate.split(',')[0].replace(/\./g, '_')}.pdf`;
                        
                        const opt = {
                            margin:       [12, 12, 12, 12],
                            filename:     nameFile,
                            image:        { type: 'jpeg', quality: 0.98 },
                            html2canvas:  { scale: 2, useCORS: true, logging: false },
                            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                            pagebreak:    { mode: ['css', 'legacy'], avoid: '.style-pdf-block' }
                        };

                        html2pdf().set(opt).from(element).save().catch(err => {
                            alert("Помилка генерації файлу: " + err.message);
                        });
                    });

                    // Безпечне видалення звіту
                    const deleteBtn = card.querySelector('.btn-delete-report');
                    deleteBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        
                        if (confirm(`Ви дійсно хочете видалити звіт від: ${inspectorName}?`)) {
                            e.currentTarget.innerText = "Видалення...";
                            e.currentTarget.disabled = true;
                            
                            try {
                                await deleteDoc(doc(db, "submitted_reports", docId));
                                document.getElementById(`card-${docId}`).remove();
                                alert("Звіт успішно видалено.");
                                
                                if (container.children.length === 0) {
                                    container.innerHTML = `<div class="bg-white rounded-2xl p-12 text-center text-slate-400 border border-slate-100 shadow-sm">📭 Жодного звіту не знайдено.</div>`;
                                }
                            } catch (err) {
                                alert("Помилка видалення: " + err.message);
                                e.currentTarget.innerText = "🗑️ Видалити цей звіт";
                                e.currentTarget.disabled = false;
                            }
                        }
                    });

                    container.appendChild(card);
                });

            } catch (error) {
                container.innerHTML = `
                    <div class="bg-red-50 border border-red-100 text-red-600 rounded-2xl p-5 text-center shadow-sm">
                        <strong class="block font-bold mb-1">Помилка завантаження бази даних!</strong>
                        <p class="text-xs font-mono">${error.message}</p>
                    </div>`;
            }
        }

        document.getElementById('btn-refresh').addEventListener('click', loadReports);
        loadReports();
    </script>
</body>
</html>
