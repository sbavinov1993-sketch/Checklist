<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комплексна перевірка</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg p-6 space-y-6">
        <h1 class="text-3xl font-bold text-center text-blue-600">Комплексний акт перевірки</h1>
        
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4">
            <label class="block text-sm font-semibold text-blue-900 mb-1">Хто проводить перевірку? (Посада, ПІБ)</label>
            <input type="text" id="main-inspector" class="w-full bg-white border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-gray-800" placeholder="Наприклад: капітан поліції Петренко В.М.">
        </div>

        <div id="checklist-container" class="space-y-4">
            <p class="text-center text-gray-500">Завантаження структури перевірки...</p>
        </div>

        <div class="pt-4 border-t border-gray-200">
            <button id="btn-submit-all" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition text-lg shadow-md hover:shadow-lg flex items-center justify-center space-x-2">
                <span>📋 Сформувати та надіслати узагальнений звіт</span>
            </button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-xl max-w-lg w-full p-6 shadow-2xl relative">
            <button id="btn-close" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
            <h3 id="modal-task-title" class="text-xl font-bold text-gray-800 mb-4">Назва пункту</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Виявлені порушення / Коментар до пункту</label>
                    <textarea id="modal-info" rows="3" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none text-gray-800" placeholder="Опишіть ситуацію за цим напрямком..."></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Фотофіксація</label>
                    <input type="file" id="modal-file" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <div id="modal-photo-preview" class="mt-3 hidden relative">
                        <img id="modal-img" src="" alt="Прев'ю" class="max-h-48 rounded-lg object-cover w-full">
                        <button id="btn-clear-photo" class="absolute top-2 right-2 bg-red-600 text-white p-1 rounded-full text-xs hover:bg-red-700">✕ Видалити</button>
                    </div>
                </div>
                
                <button id="btn-save" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition">
                    Зберегти локально в акт
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5x6CnVTrySbKGlu7n1GOWrGKNO78sKJc",
            authDomain: "checklist-144ac.firebaseapp.com",
            projectId: "checklist-144ac",
            messagingSenderId: "32249871886",
            appId: "1:32249871886:web:951b7e7787f5418ef0465f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Головне сховище для поточного акту перевірки в пам'яті браузера
        let localReportData = {}; 
        let currentActiveKey = null;

        async function initApp() {
            try {
                const container = document.getElementById('checklist-container');
                container.innerHTML = '';

                // Отримуємо структуру шаблону з бази
                const sectionsSnapshot = await getDocs(collection(db, "sections"));
                
                for (const sectionDoc of sectionsSnapshot.docs) {
                    const sectionData = sectionDoc.data();
                    const sectionHtml = document.createElement('div');
                    sectionHtml.className = "border-l-4 border-blue-500 bg-gray-50 rounded-r-xl p-4 shadow-xs mb-2";
                    
                    const sectionTitle = sectionData.title || sectionData.text || 'Розділ';
                    sectionHtml.innerHTML = `<h2 class="text-lg font-bold text-blue-900 mb-2">${sectionTitle}</h2>`;
                    
                    const tasksContainer = document.createElement('div');
                    tasksContainer.className = "space-y-2";
                    sectionHtml.appendChild(tasksContainer);
                    container.appendChild(sectionHtml);

                    const tasksSnapshot = await getDocs(collection(db, `sections/${sectionDoc.id}/tasks`));
                    tasksSnapshot.forEach((taskDoc) => {
                        const taskData = taskDoc.data();
                        const uniqueKey = `${sectionDoc.id}_${taskDoc.id}`;
                        const taskTitle = taskData.text || taskData.title || "Завдання";

                        // Ініціалізуємо пустий об'єкт під кожен пункт шаблону
                        localReportData[uniqueKey] = {
                            taskTitle: taskTitle,
                            comment: "",
                            photo: ""
                        };

                        const taskRow = document.createElement('div');
                        taskRow.id = `row-${uniqueKey}`;
                        taskRow.className = "flex items-center justify-between p-3 bg-white border border-gray-200 rounded-lg hover:border-blue-300 transition cursor-pointer shadow-2xs";
                        
                        taskRow.innerHTML = `
                            <span class="font-medium text-gray-700 text-sm">${taskTitle}</span>
                            <div class="text-xs flex items-center space-x-1.5" id="status-${uniqueKey}">
                                <span class="bg-gray-100 text-gray-500 px-2 py-1 rounded">Внести дані</span>
                            </div>
                        `;

                        taskRow.addEventListener('click', () => openModal(uniqueKey));
                        tasksContainer.appendChild(taskRow);
                    });
                }
            } catch (e) {
                alert("Помилка завантаження структури: " + e.message);
            }
        }

        function openModal(key) {
            currentActiveKey = key;
            const data = localReportData[key];
            
            document.getElementById('modal-task-title').innerText = data.taskTitle;
            document.getElementById('modal-info').value = data.comment;
            document.getElementById('modal-file').value = '';
            
            const imgPreview = document.getElementById('modal-photo-preview');
            if (data.photo) {
                document.getElementById('modal-img').src = data.photo;
                imgPreview.classList.remove('hidden');
            } else {
                imgPreview.classList.add('hidden');
            }
            
            document.getElementById('modal').classList.remove('hidden');
        }

        function resizeAndConvertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 500;
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5));
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        // Локальне збереження гілки в загальний масив у пам'яті сайту
        async function saveModalData() {
            if (!currentActiveKey) return;
            
            const commentText = document.getElementById('modal-info').value.trim();
            localReportData[currentActiveKey].comment = commentText;

            const fileInput = document.getElementById('modal-file');
            if (fileInput.files.length > 0) {
                try {
                    localReportData[currentActiveKey].photo = await resizeAndConvertToBase64(fileInput.files[0]);
                } catch (error) {
                    alert("Помилка фото: " + error.message);
                }
            }

            updateItemBadges(currentActiveKey);
            closeModal();
        }

        // Оновлення іконок на головній сторінці (показує що внесено)
        function updateItemBadges(key) {
            const data = localReportData[key];
            const statusContainer = document.getElementById(`status-${key}`);
            const row = document.getElementById(`row-${key}`);
            
            if (data.comment || data.photo) {
                row.classList.add('border-blue-400', 'bg-blue-50/30');
                statusContainer.innerHTML = `
                    ${data.comment ? '<span title="Є коментар">📝</span>' : ''}
                    ${data.photo ? '<span title="Є фото">🖼️</span>' : ''}
                    <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded font-medium">Збережено</span>
                `;
            } else {
                row.classList.remove('border-blue-400', 'bg-blue-50/30');
                statusContainer.innerHTML = `<span class="bg-gray-100 text-gray-500 px-2 py-1 rounded">Внести дані</span>`;
            }
        }

        // ВЕЛИКА ФІНАЛЬНА ВІДПРАВКА ОДНИМ ДОКУМЕНТОМ
        async function submitFinalReport() {
            const inspector = document.getElementById('main-inspector').value.trim();
            if (!inspector) {
                alert("Помилка! Спочатку заповніть поле 'Хто проводить перевірку' на початку сторінки.");
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            // Відфільтровуємо лише ті пункти, куди інспектор реально щось записав або додав фото
            const filledItems = [];
            for (const key in localReportData) {
                if (localReportData[key].comment || localReportData[key].photo) {
                    filledItems.push({
                        itemKey: key,
                        taskTitle: localReportData[key].taskTitle,
                        comment: localReportData[key].comment,
                        photoUrl: localReportData[key].photo
                    });
                }
            }

            if (filledItems.length === 0) {
                alert("Ви не внесли жодних даних у жоден з пунктів! Немає чого відправляти.");
                return;
            }

            if (!confirm(`Сформувати підсумковий звіт від імені: ${inspector}?`)) return;

            const btnSubmit = document.getElementById('btn-submit-all');
            btnSubmit.innerText = "⚡ Синхронізація та відправка акту...";
            btnSubmit.disabled = true;

            const finalDocument = {
                inspectorName: inspector,
                createdAt: new Date().toISOString(),
                totalItemsChecked: filledItems.length,
                records: filledItems // Тут лежать всі заповнені пункти одним масивом!
            };

            try {
                // Відправляємо один великий структурований документ
                await addDoc(collection(db, "submitted_reports"), finalDocument);
                alert("🎉 Узагальнений звіт успішно надіслано в базу! Сторінку буде очищено.");
                
                // Повне скидання форми до чистого стану
                document.getElementById('main-inspector').value = '';
                initApp(); 
            } catch (err) {
                alert("Критична помилка Firebase: " + err.message);
            } finally {
                btnSubmit.innerText = "📋 Сформувати та надіслати узагальнений звіт";
                btnSubmit.disabled = false;
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            currentActiveKey = null;
        }

        // Локальне видалення фото всередині модалки (до збереження)
        document.getElementById('btn-clear-photo').addEventListener('click', () => {
            if(currentActiveKey) {
                localReportData[currentActiveKey].photo = "";
                document.getElementById('modal-photo-preview').classList.add('hidden');
                document.getElementById('modal-file').value = '';
            }
        });

        document.getElementById('modal-file').addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('modal-img').src = e.target.result;
                    document.getElementById('modal-photo-preview').classList.remove('hidden');
                }
                reader.readAsDataURL(this.files[0]);
            }
        });

        document.getElementById('btn-close').addEventListener('click', closeModal);
        document.getElementById('btn-save').addEventListener('click', saveModalData);
        document.getElementById('btn-submit-all').addEventListener('click', submitFinalReport);

        initApp();
    </script>
</body>
</html>
