<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контрольний список</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">Контрольний список</h1>
        
        <div id="checklist-container" class="space-y-6">
            <p class="text-center text-gray-500">Завантаження розділів...</p>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-xl max-w-lg w-full p-6 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
            
            <h3 id="modal-task-title" class="text-xl font-bold text-gray-800 mb-4">Назва завдання</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Додаткова інформація / Коментар</label>
                    <textarea id="modal-info" rows="3" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Введіть нотатки тут..."></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Фотодоказ</label>
                    <input type="file" id="modal-file" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <div id="modal-photo-preview" class="mt-3 hidden">
                        <p class="text-xs text-gray-500 mb-1">Завантажене фото:</p>
                        <img id="modal-img" src="" alt="Прев'ю" class="max-h-48 rounded-lg object-cover">
                    </div>
                </div>
                
                <button id="btn-save" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition">
                    Зберегти зміни
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // ВАШІ НАЛАШТУВАННЯ FIREBASE (Скопіюйте їх зі свого Firebase Console)
        const firebaseConfig = {
            apiKey: "AIzaSyA5x6CnVTrySbKGlu7n1GOWrGKNO78sKJc",
            authDomain: "checklist-144ac.firebaseapp.com",
            projectId: "checklist-144ac",
            storageBucket: "checklist-144ac.firebasestorage.app",
            messagingSenderId: "32249871886",
            appId: "1:32249871886:web:951b7e7787f5418ef0465f"
        };

        // Ініціалізація сервісів
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentActiveTask = null; // Для відстеження, яке підзавдання зараз відкрито в модальному вікні

        // ФУНКЦІЯ СЛУХАННЯ ДАНИХ (Оновлює екран автоматично при змінах в БД)
        function loadChecklist() {
            const sectionsRef = collection(db, "sections");
            
            // Отримуємо всі головні Блоки (Розділи)
            onSnapshot(sectionsRef, async (querySnapshot) => {
                const container = document.getElementById('checklist-container');
                container.innerHTML = ''; // Очищуємо перед оновленням

                if(querySnapshot.empty) {
                    container.innerHTML = '<p class="text-center text-gray-500">Додайте колекцію "sections" та документи в Firestore.</p>';
                    return;
                }

                for (const sectionDoc of querySnapshot.docs) {
                    const sectionData = sectionDoc.data();
                    
                    // Створюємо HTML-каркас для Розділу (Блоку)
                    const sectionHtml = document.createElement('div');
                    sectionHtml.className = "border-l-4 border-blue-500 bg-gray-50 rounded-r-xl p-4 shadow-sm";
                    sectionHtml.innerHTML = `<h2 class="text-xl font-bold text-blue-900 mb-3">${sectionData.title || 'Розділ без назви'}</h2>`;
                    
                    const tasksListContainer = document.createElement('div');
                    tasksListContainer.className = "space-y-2";
                    sectionHtml.appendChild(tasksListContainer);
                    container.appendChild(sectionHtml);

                    // Отримуємо Підблоки (Підколекцію tasks для кожного розділу)
                    const tasksRef = collection(db, `sections/${sectionDoc.id}/tasks`);
                    const tasksSnapshot = await getDocs(tasksRef);
                    
                    if(tasksSnapshot.empty) {
                        tasksListContainer.innerHTML = '<p class="text-sm text-gray-400 italic">Немає підблоків</p>';
                    }

                    tasksSnapshot.forEach((taskDoc) => {
                        const taskData = taskDoc.data();
                        const taskId = taskDoc.id;
                        const sectionId = sectionDoc.id;

                        // Створюємо елемент підблоку
                        const taskRow = document.createElement('div');
                        taskRow.className = "flex items-center justify-between p-3 bg-white border border-gray-200 rounded-lg hover:border-blue-300 transition cursor-pointer shadow-2xs";
                        
                        // Клік по всьому рядку (окрім чекбоксу) відкриває модальне вікно
                        taskRow.addEventListener('click', (e) => {
                            if (e.target.type !== 'checkbox') {
                                openModal(sectionId, taskId, taskData);
                            }
                        });

                        taskRow.innerHTML = `
                            <div class="flex items-center space-x-3">
                                <input type="checkbox" ${taskData.isCompleted ? 'checked' : ''} 
                                    class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer">
                                <span class="font-medium ${taskData.isCompleted ? 'line-through text-gray-400' : 'text-gray-700'}">${taskData.title}</span>
                            </div>
                            <div class="text-xs text-gray-400 flex items-center space-x-2">
                                ${taskData.additionalInfo ? '📝' : ''}
                                ${taskData.photoUrl ? '🖼️' : ''}
                                <span class="bg-gray-100 px-2 py-1 rounded hover:bg-gray-200">Деталі</span>
                            </div>
                        `;

                        // Обробник зміни чекбоксу (оновлення в Firebase)
                        const checkbox = taskRow.querySelector('input[type="checkbox"]');
                        checkbox.addEventListener('change', async (e) => {
                            const taskDocRef = doc(db, `sections/${sectionId}/tasks/${taskId}`);
                            await updateDoc(taskDocRef, {
                                isCompleted: e.target.checked
                            });
                        });

                        tasksListContainer.appendChild(taskRow);
                    });
                }
            });
        }

        // ФУНКЦІЯ ВІДКРИТТЯ МОДАЛЬНОГО ВІКНА
        function openModal(sectionId, taskId, taskData) {
            currentActiveTask = { sectionId, taskId, taskData };
            
            document.getElementById('modal-task-title').innerText = taskData.title;
            document.getElementById('modal-info').value = taskData.additionalInfo || '';
            
            const imgPreview = document.getElementById('modal-photo-preview');
            const img = document.getElementById('modal-img');
            document.getElementById('modal-file').value = ''; // Очищуємо інпут файлу
            
            if (taskData.photoUrl) {
                img.src = taskData.photoUrl;
                imgPreview.classList.remove('hidden');
            } else {
                imgPreview.classList.add('hidden');
            }
            
            document.getElementById('modal').classList.remove('hidden');
        }

        // ФУНКЦІЯ ЗБЕРЕЖЕННЯ ДАНИХ З МОДАЛЬНОГО ВІКНА
        async function saveModalData() {
            if (!currentActiveTask) return;
            const { sectionId, taskId } = currentActiveTask;
            
            const btnSave = document.getElementById('btn-save');
            btnSave.innerText = "Зберігання...";
            btnSave.disabled = true;

            const infoText = document.getElementById('modal-info').value;
            const fileInput = document.getElementById('modal-file');
            const taskDocRef = doc(db, `sections/${sectionId}/tasks/${taskId}`);
            
            let updatedData = { additionalInfo: infoText };

            // Перевіряємо, чи вибрано новий файл для завантаження в Storage
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const storageRef = ref(storage, `task_photos/${sectionId}_${taskId}_${file.name}`);
                
                try {
                    const snapshot = await uploadBytes(storageRef, file);
                    const downloadUrl = await getDownloadURL(snapshot.ref);
                    updatedData.photoUrl = downloadUrl; // Додаємо посилання на фото
                } catch (error) {
                    alert("Помилка завантаження фото: " + error.message);
                }
            }

            // Оновлюємо Firestore
            await updateDoc(taskDocRef, updatedData);
            
            btnSave.innerText = "Зберегти зміни";
            btnSave.disabled = false;
            closeModal();
            loadChecklist(); // Перезавантажуємо списки
        }

        // Закриття модального вікна
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            currentActiveTask = null;
        }

        // Робимо функції доступними для кліків у HTML-тегах
        window.closeModal = closeModal;
        document.getElementById('btn-save').addEventListener('click', saveModalData);

        // Запуск додатку
        loadChecklist();
    </script>
</body>
</html>
