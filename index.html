<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контрольний список</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">Контрольний список</h1>
        <div id="checklist-container" class="space-y-6">
            <p class="text-center text-gray-500">Завантаження розділів...</p>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-xl max-w-lg w-full p-6 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
            <h3 id="modal-task-title" class="text-xl font-bold text-gray-800 mb-4">Назва завдання</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Додаткова інформація / Коментар</label>
                    <textarea id="modal-info" rows="3" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Введіть нотатки тут..."></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Фотодоказ</label>
                    <input type="file" id="modal-file" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <div id="modal-photo-preview" class="mt-3 hidden">
                        <p class="text-xs text-gray-500 mb-1">Завантажене фото:</p>
                        <img id="modal-img" src="" alt="Прев'ю" class="max-h-48 rounded-lg object-cover w-full">
                    </div>
                </div>
                
                <button id="btn-save" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition">
                    Зберегти зміни
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // СЮДИ ВСТАВТЕ СВОЇ КЛЮЧІ FIREBASE З КОНСОЛІ
        const firebaseConfig = {
            apiKey: "AIzaSyYourActualApiKeyHere...",
            authDomain: "checklist-144ac.firebaseapp.com",
            projectId: "checklist-144ac",
            storageBucket: "checklist-144ac.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentActiveTask = null;

        // Функція завантаження та відображення чек-ліста
        function loadChecklist() {
            onSnapshot(collection(db, "sections"), async (querySnapshot) => {
                const container = document.getElementById('checklist-container');
                container.innerHTML = '';

                if(querySnapshot.empty) {
                    container.innerHTML = '<p class="text-center text-gray-500">Створіть структуру "sections" -> "tasks" в Firestore.</p>';
                    return;
                }

                for (const sectionDoc of querySnapshot.docs) {
                    const sectionData = sectionDoc.data();
                    const sectionHtml = document.createElement('div');
                    sectionHtml.className = "border-l-4 border-blue-500 bg-gray-50 rounded-r-xl p-4 shadow-sm";
                    sectionHtml.innerHTML = `<h2 class="text-xl font-bold text-blue-900 mb-3">${sectionData.title || 'Розділ'}</h2>`;
                    
                    const tasksListContainer = document.createElement('div');
                    tasksListContainer.className = "space-y-2";
                    sectionHtml.appendChild(tasksListContainer);
                    container.appendChild(sectionHtml);

                    const tasksSnapshot = await getDocs(collection(db, `sections/${sectionDoc.id}/tasks`));

                    tasksSnapshot.forEach((taskDoc) => {
                        const taskData = taskDoc.data();
                        const taskId = taskDoc.id;
                        const sectionId = sectionDoc.id;

                        const taskRow = document.createElement('div');
                        taskRow.className = "flex items-center justify-between p-3 bg-white border border-gray-200 rounded-lg hover:border-blue-300 transition cursor-pointer shadow-2xs";
                        
                        taskRow.addEventListener('click', (e) => {
                            if (e.target.type !== 'checkbox') openModal(sectionId, taskId, taskData);
                        });

                        taskRow.innerHTML = `
                            <div class="flex items-center space-x-3">
                                <input type="checkbox" ${taskData.isCompleted ? 'checked' : ''} class="w-5 h-5 text-blue-600 rounded border-gray-300 cursor-pointer">
                                <span class="font-medium ${taskData.isCompleted ? 'line-through text-gray-400' : 'text-gray-700'}">${taskData.title}</span>
                            </div>
                            <div class="text-xs text-gray-400 flex items-center space-x-2">
                                ${taskData.additionalInfo ? '📝' : ''}
                                ${taskData.photoUrl ? '🖼️' : ''}
                                <span class="bg-gray-100 px-2 py-1 rounded">Деталі</span>
                            </div>
                        `;

                        taskRow.querySelector('input[type="checkbox"]').addEventListener('change', async (e) => {
                            await updateDoc(doc(db, `sections/${sectionId}/tasks/${taskId}`), { isCompleted: e.target.checked });
                        });

                        tasksListContainer.appendChild(taskRow);
                    });
                }
            });
        }

        function openModal(sectionId, taskId, taskData) {
            currentActiveTask = { sectionId, taskId, taskData };
            document.getElementById('modal-task-title').innerText = taskData.title;
            document.getElementById('modal-info').value = taskData.additionalInfo || '';
            
            const imgPreview = document.getElementById('modal-photo-preview');
            const img = document.getElementById('modal-img');
            document.getElementById('modal-file').value = '';
            
            if (taskData.photoUrl) {
                img.src = taskData.photoUrl;
                imgPreview.classList.remove('hidden');
            } else {
                imgPreview.classList.add('hidden');
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        // Функція стиснення та конвертації фото в текст (Base64)
        function convertFileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // Функція збереження даних
        async function saveModalData() {
            if (!currentActiveTask) return;
            const { sectionId, taskId } = currentActiveTask;
            
            const btnSave = document.getElementById('btn-save');
            btnSave.innerText = "Зберігання...";
            btnSave.disabled = true;

            const infoText = document.getElementById('modal-info').value;
            const fileInput = document.getElementById('modal-file');
            
            let updatedData = { additionalInfo: infoText };

            if (fileInput.files.length > 0) {
                try {
                    // Конвертуємо файл прямо в текст і пишемо в Firestore
                    const base64String = await convertFileToBase64(fileInput.files[0]);
                    updatedData.photoUrl = base64String;
                } catch (error) {
                    alert("Помилка обробки фото: " + error.message);
                }
            }

            await updateDoc(doc(db, `sections/${sectionId}/tasks/${taskId}`), updatedData);
            
            btnSave.innerText = "Зберегти зміни";
            btnSave.disabled = false;
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            currentActiveTask = null;
        }

        window.closeModal = closeModal;
        document.getElementById('btn-save').addEventListener('click', saveModalData);
        loadChecklist();
    </script>
</body>
</html>
