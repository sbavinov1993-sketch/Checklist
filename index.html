<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Контрольний Список</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Базові налаштування сторінки */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            padding: 24px 16px; 
            color: #1e293b;
            line-height: 1.5;
        }
        .container { 
            max-width: 650px; 
            margin: 0 auto; 
            background: #ffffff; 
            padding: 32px 24px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); 
        }
        
        /* Головний заголовок */
        h1 { 
            text-align: center; 
            color: #0f172a; 
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 28px; 
            letter-spacing: -0.5px;
        }

        /* Стилізація інформаційних повідомлень */
        #checklist-content {
            font-size: 15px;
        }
        .no-data { 
            text-align: center; 
            color: #64748b; 
            font-style: italic; 
            padding: 30px; 
            background: #f8fafc;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
        }

        /* Окремі блоки/розділи */
        .section-box { 
            background: #f8fafc; 
            border: 1px solid #e2e8f0;
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
            transition: all 0.2s ease;
        }
        .section-box:hover {
            border-color: #cbd5e1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .section-title { 
            font-weight: 600; 
            font-size: 16px; 
            margin-bottom: 14px; 
            color: #2563eb; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0; 
            padding-bottom: 6px; 
        }

        /* Елементи списку (завдання) */
        .task-item { 
            display: flex; 
            align-items: flex-start; 
            padding: 10px 8px; 
            font-size: 15px; 
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.15s ease;
        }
        .task-item:hover {
            background: #f1f5f9;
        }
        
        /* Кастомний дизайн чекбоксів */
        .task-item input[type="checkbox"] { 
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            margin-right: 12px; 
            margin-top: 1px;
            flex-shrink: 0;
            cursor: pointer;
            display: grid;
            place-content: center;
            transition: all 0.15s ease;
        }
        .task-item input[type="checkbox"]::before {
            content: "";
            width: 10px;
            height: 10px;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            background-color: #ffffff;
            /* Малюємо галочку через clip-path */
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .task-item input[type="checkbox"]:checked {
            background-color: #10b981;
            border-color: #10b981;
        }
        .task-item input[type="checkbox"]:checked::before {
            transform: scale(1);
        }
        .task-item input[type="checkbox"]:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
        }

        /* Текст завдання */
        .task-item span {
            transition: all 0.15s ease;
            user-select: none;
        }

        /* Ефект для виконаних завдань */
        .task-item.completed {
            background: transparent;
        }
        .task-item.completed span { 
            text-decoration: line-through; 
            color: #94a3b8; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Контрольний список</h1>
        <div id="checklist-content">Спроба підключення до бази даних...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5x6CnVTrySbKGlu7n1GOWrGKNO78sKJc",
            authDomain: "checklist-144ac.firebaseapp.com",
            projectId: "checklist-144ac",
            storageBucket: "checklist-144ac.firebasestorage.app",
            messagingSenderId: "32249871886",
            appId: "1:32249871886:web:951b7e7787f5418ef0465f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadChecklist() {
            const contentDiv = document.getElementById('checklist-content');
            
            try {
                let collectionName = "розділи";
                let sectionsSnapshot = await getDocs(collection(db, collectionName));
                if (sectionsSnapshot.empty) {
                    collectionName = "sections";
                    sectionsSnapshot = await getDocs(collection(db, collectionName));
                }

                if (sectionsSnapshot.empty) {
                    contentDiv.innerHTML = '<div class="no-data">У базі даних поки немає створених блоків.</div>';
                    return;
                }

                contentDiv.innerHTML = ''; 

                for (const sectionDoc of sectionsSnapshot.docs) {
                    const sectionData = sectionDoc.data();
                    const blockTitle = sectionData.титул || sectionData.title || "Блок без назви";

                    const sectionBox = document.createElement('div');
                    sectionBox.className = 'section-box';
                    sectionBox.innerHTML = `<div class="section-title">${blockTitle}</div>`;

                    let taskCollectionName = "завдання";
                    let tasksSnapshot = await getDocs(collection(db, collectionName, sectionDoc.id, taskCollectionName));
                    if (tasksSnapshot.empty) {
                        taskCollectionName = "tasks";
                        tasksSnapshot = await getDocs(collection(db, collectionName, sectionDoc.id, taskCollectionName));
                    }

                    tasksSnapshot.forEach((taskDoc) => {
                        const taskData = taskDoc.data();
                        
                        const isDone = taskData.isCompleted === true || taskData.Завершено === true;
                        const taskText = taskData.text || taskData.текст || "Пусте завдання";

                        const taskItem = document.createElement('label'); // Змінено на label для зручності кліку по тексту
                        taskItem.className = `task-item ${isDone ? 'completed' : ''}`;
                        
                        taskItem.innerHTML = `
                            <input type="checkbox" ${isDone ? 'checked' : ''}>
                            <span>${taskText}</span>
                        `;

                        const checkbox = taskItem.querySelector('input');
                        
                        checkbox.addEventListener('change', async () => {
                            const newStatus = checkbox.checked;
                            
                            if (newStatus) {
                                taskItem.classList.add('completed');
                            } else {
                                taskItem.classList.remove('completed');
                            }

                            const taskDocRef = doc(db, collectionName, sectionDoc.id, taskCollectionName, taskDoc.id);
                            
                            try {
                                await updateDoc(taskDocRef, {
                                    isCompleted: newStatus,
                                    ...(taskData.hasOwnProperty('Завершено') && { Завершено: newStatus })
                                });
                                console.log("Статус успішно змінено в Firebase!");
                            } catch (err) {
                                console.error("Не вдалося оновити базу даних:", err);
                            }
                        });

                        sectionBox.appendChild(taskItem);
                    });

                    contentDiv.appendChild(sectionBox);
                }
            } catch (error) {
                console.error("Помилка:", error);
                contentDiv.innerHTML = `<div class="no-data" style="color:#ef4444; border-color:#fca5a5;">Помилка зв'язку: ${error.message}</div>`;
            }
        }

        loadChecklist();
    </script>
</body>
</html>
