<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контрольний список</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">Контрольний список (Звітність)</h1>
        <div id="checklist-container" class="space-y-6">
            <p class="text-center text-gray-500">Завантаження даних...</p>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-xl max-w-lg w-full p-6 shadow-2xl relative">
            <button id="btn-close" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
            <h3 id="modal-task-title" class="text-xl font-bold text-gray-800 mb-4">Назва</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Хто проводить перевірку? (ПІБ)</label>
                    <input type="text" id="modal-inspector" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Введіть ваше прізвище...">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Додаткова інформація / Коментар</label>
                    <textarea id="modal-info" rows="3" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Введіть нотатки..."></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Фотодоказ</label>
                    <input type="file" id="modal-file" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <div id="modal-photo-preview" class="mt-3 hidden">
                        <img id="modal-img" src="" alt="Прев'ю" class="max-h-48 rounded-lg object-cover w-full">
                    </div>
                </div>
                
                <button id="btn-save" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 rounded-lg transition">
                    🚀 Надіслати звіт (Зберегти окремо)
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // Додали корисну функцію addDoc для створення нових записів
        import { getFirestore, collection, getDocs, doc, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5x6CnVTrySbKGlu7n1GOWrGKNO78sKJc",
            authDomain: "checklist-144ac.firebaseapp.com",
            projectId: "checklist-144ac",
            messagingSenderId: "32249871886",
            appId: "1:32249871886:web:951b7e7787f5418ef0465f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentActiveTask = null;

        function loadChecklist() {
            onSnapshot(collection(db, "sections"), async (querySnapshot) => {
                const container = document.getElementById('checklist-container');
                container.innerHTML = '';

                for (const sectionDoc of querySnapshot.docs) {
                    const sectionData = sectionDoc.data();
                    const sectionHtml = document.createElement('div');
                    sectionHtml.className = "border-l-4 border-blue-500 bg-gray-50 rounded-r-xl p-4 shadow-sm mb-4";
                    
                    const sectionTitle = sectionData.title || sectionData.text || 'Розділ';
                    sectionHtml.innerHTML = `<h2 class="text-xl font-bold text-blue-900 mb-3">${sectionTitle}</h2>`;
                    
                    const tasksListContainer = document.createElement('div');
                    tasksListContainer.className = "space-y-2";
                    sectionHtml.appendChild(tasksListContainer);
                    container.appendChild(sectionHtml);

                    const tasksSnapshot = await getDocs(collection(db, `sections/${sectionDoc.id}/tasks`));

                    tasksSnapshot.forEach((taskDoc) => {
                        const taskData = taskDoc.data();
                        const taskId = taskDoc.id;
                        const sectionId = sectionDoc.id;

                        const taskRow = document.createElement('div');
                        taskRow.className = "flex items-center justify-between p-3 bg-white border border-gray-200 rounded-lg hover:border-blue-300 transition cursor-pointer shadow-xs";
                        
                        taskRow.addEventListener('click', () => {
                            openModal(sectionId, taskId, taskData);
                        });

                        const taskTitle = taskData.text || taskData.title || "Завдання";

                        taskRow.innerHTML = `
                            <div class="flex items-center space-x-3">
                                <span class="font-medium text-gray-700">${taskTitle}</span>
                            </div>
                            <div class="text-xs text-gray-400 flex items-center space-x-2">
                                <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded font-medium">Заповнити звіт</span>
                            </div>
                        `;
                        tasksListContainer.appendChild(taskRow);
                    });
                }
            });
        }

        function openModal(sectionId, taskId, taskData) {
            currentActiveTask = { sectionId, taskId, taskData };
            document.getElementById('modal-task-title').innerText = taskData.text || taskData.title || "Деталі";
            
            // Очищаємо поля для нового заповнення
            document.getElementById('modal-inspector').value = '';
            document.getElementById('modal-info').value = '';
            document.getElementById('modal-file').value = '';
            document.getElementById('modal-photo-preview').classId = 'hidden';
            
            document.getElementById('modal').classList.remove('hidden');
        }

        function resizeAndConvertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 500; // Трохи збільшили якість
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5));
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        // НОВА ЛОГІКА: ЗБЕРЕЖЕННЯ ОКРЕМЫМ ДОКУМЕНТОМ
        async function saveModalData() {
            if (!currentActiveTask) return;
            
            const inspectorName = document.getElementById('modal-inspector').value.trim();
            if (!inspectorName) {
                alert("Будь ласка, вкажіть, хто проводить перевірку (ПІБ)!");
                return;
            }

            const btnSave = document.getElementById('btn-save');
            btnSave.innerText = "Відправка звіту...";
            btnSave.disabled = true;

            // Формуємо окремий звіт
            const reportData = {
                taskTitle: currentActiveTask.taskData.text || currentActiveTask.taskData.title,
                sectionId: currentActiveTask.sectionId,
                taskId: currentActiveTask.taskId,
                inspector: inspectorName,
                additionalInfo: document.getElementById('modal-info').value,
                submittedAt: new Date().toISOString(), // Час відправки
                photoUrl: ""
            };

            const fileInput = document.getElementById('modal-file');
            if (fileInput.files.length > 0) {
                try {
                    reportData.photoUrl = await resizeAndConvertToBase64(fileInput.files[0]);
                } catch (error) {
                    alert("Помилка обробки фото: " + error.message);
                }
            }

            try {
                // СВЯТИНЯ: Зберігаємо в окрему таблицю (колекцію) 'submitted_reports'
                await addDoc(collection(db, "submitted_reports"), reportData);
                alert("Звіт успішно збережено окремо! Форма знову вільна.");
                closeModal();
            } catch (err) {
                alert("Помилка Firebase: " + err.message);
            } finally {
                btnSave.innerText = "🚀 Надіслати звіт (Зберегти окремо)";
                btnSave.disabled = false;
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            currentActiveTask = null;
        }

        // Автоматичне прев'ю при виборі файлу
        document.getElementById('modal-file').addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('modal-img').src = e.target.result;
                    document.getElementById('modal-photo-preview').classList.remove('hidden');
                }
                reader.readAsDataURL(this.files[0]);
            }
        });

        document.getElementById('btn-close').addEventListener('click', closeModal);
        document.getElementById('btn-save').addEventListener('click', saveModalData);
        loadChecklist();
    </script>
</body>
</html>
