<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архів методичних перевірок</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Стилі для друкованої версії акту */
        .pdf-page {
            font-family: Arial, sans-serif !important;
            color: #000000 !important;
        }
        .pdf-avoid-break {
            page-break-inside: avoid !important;
            break-inside: avoid !important;
        }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen p-4 md:p-8 text-[#334155]">

    <div class="max-w-5xl mx-auto space-y-6">
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-[#e2e8f0] flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-[#0f172a] tracking-tight">📊 Архів методичних звітів</h1>
                <p class="text-sm text-[#64748b] mt-1">Перегляд внесених результатів та генерація PDF-актів</p>
            </div>
            <a href="method_checklist.html" class="inline-flex items-center text-sm font-medium text-[#2563eb] hover:underline">
                ← Повернутись до заповнення
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-5 bg-white rounded-2xl p-4 border border-[#e2e8f0] shadow-sm h-[calc(100vh-200px)] overflow-y-auto">
                <h2 class="text-sm font-bold text-[#475569] uppercase tracking-wider mb-3 px-2">Збережені інспекції</h2>
                <div id="reports-list" class="space-y-2">
                    <p class="text-sm text-[#64748b] p-3 text-center">Завантаження звітів з Firebase...</p>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-4">
                <div id="report-viewer" class="bg-white rounded-2xl p-6 border border-[#e2e8f0] shadow-sm min-h-[400px] flex flex-col justify-center items-center text-[#64748b]">
                    <span class="text-4xl mb-2">📄</span>
                    <p class="text-sm font-medium">Оберіть звіт зі списку ліворуч для перегляду та вивантаження</p>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5x6CnVTrySbKGlu7n1GOWrGKNO78sKJc",
            authDomain: "checklist-144ac.firebaseapp.com",
            projectId: "checklist-144ac",
            messagingSenderId: "32249871886",
            appId: "1:32249871886:web:951b7e7787f5418ef0465f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeReports = {};

        // Завантаження даних з бази
        async function loadReports() {
            const listContainer = document.getElementById('reports-list');
            try {
                // Запитуємо документи з сортуванням від найновіших
                const q = query(collection(db, "methodical_inspections"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    listContainer.innerHTML = `<p class="text-sm text-[#94a3b8] p-4 text-center">У базі поки немає жодного звіту.</p>`;
                    return;
                }

                listContainer.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    activeReports[doc.id] = data;

                    // Форматуємо дату
                    const dateObj = new Date(data.createdAt);
                    const formattedDate = dateObj.toLocaleString('uk-UA', { 
                        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' 
                    });

                    // Рахуємо кількість порушень для індикатора
                    const violationsCount = data.records ? data.records.filter(r => r.status === 'Порушення').length : 0;
                    const badgeClass = violationsCount > 0 ? 'bg-[#fef2f2] text-[#991b1b] border-[#fecaca]' : 'bg-[#f0fdf4] text-[#166534] border-[#bbf7d0]';

                    const itemHtml = `
                        <button onclick="window.viewReport('${doc.id}')" id="btn-${doc.id}" class="w-full text-left p-3 rounded-xl border border-[#e2e8f0] hover:border-[#2563eb] hover:bg-[#f8fafc] transition flex flex-col gap-1 group">
                            <div class="flex justify-between items-start w-full">
                                <span class="font-semibold text-sm text-[#1e293b] group-hover:text-[#2563eb]">${data.inspectorName || 'Невідомий інспектор'}</span>
                                <span class="text-[10px] px-2 py-0.5 rounded-md border ${badgeClass}">
                                    ${violationsCount > 0 ? `Порушень: ${violationsCount}` : 'Норма'}
                                </span>
                            </div>
                            <span class="text-xs text-[#64748b]">${formattedDate}</span>
                        </button>
                    `;
                    listContainer.insertAdjacentHTML('beforeend', itemHtml);
                });

            } catch (error) {
                listContainer.innerHTML = `<p class="text-sm text-[#ef4444] p-4 text-center">Помилка завантаження: ${error.message}</p>`;
            }
        }

        // Відображення конкретного звіту в правій панелі
        window.viewReport = function(id) {
            const data = activeReports[id];
            if (!data) return;

            // Знімаємо виділення з усіх кнопок і додаємо на поточну
            document.querySelectorAll('#reports-list button').forEach(b => b.classList.remove('border-[#2563eb]', 'bg-[#f0f9ff]'));
            document.getElementById(`btn-${id}`).classList.add('border-[#2563eb]', 'bg-[#f0f9ff]');

            const viewer = document.getElementById('report-viewer');
            viewer.className = "bg-white rounded-2xl p-6 border border-[#e2e8f0] shadow-sm"; // скидаємо центрування

            const dateObj = new Date(data.createdAt);
            const formattedDate = dateObj.toLocaleString('uk-UA', { dateStyle: 'long', timeStyle: 'short' });

            let itemsHtml = '';
            data.records.forEach((rec, idx) => {
                const isViolation = rec.status === 'Порушення';
                const statusBadge = isViolation 
                    ? `<span class="text-xs font-bold text-[#991b1b] bg-[#fef2f2] px-2 py-1 rounded-md border border-[#fecaca]">⚠️ Виявлено порушення</span>`
                    : `<span class="text-xs font-bold text-[#166534] bg-[#f0fdf4] px-2 py-1 rounded-md border border-[#bbf7d0]">✅ Відповідає нормі</span>`;

                itemsHtml += `
                    <div class="pdf-avoid-break p-3 rounded-xl border border-[#f1f5f9] bg-[#f8fafc] space-y-2">
                        <div class="flex justify-between items-start gap-4">
                            <span class="text-sm font-semibold text-[#1e293b]">${idx + 1}. ${rec.taskTitle}</span>
                            ${statusBadge}
                        </div>
                        ${rec.comment ? `<p class="text-xs bg-white p-2 rounded-lg border border-[#e2e8f0] text-[#334155]"><strong class="text-[#475569]">Зауваження:</strong> ${rec.comment}</p>` : ''}
                    </div>
                `;
            });

            viewer.innerHTML = `
                <div class="flex justify-between items-center border-b border-[#f1f5f9] pb-4 mb-4">
                    <div>
                        <h2 class="text-lg font-bold text-[#0f172a]" id="pdf-inspector">${data.inspectorName}</h2>
                        <p class="text-xs text-[#64748b]">${formattedDate}</p>
                    </div>
                    <button onclick="window.generatePDF('${id}')" class="bg-[#16a34a] hover:bg-green-700 text-white text-xs font-medium px-4 py-2 rounded-xl transition shadow-sm flex items-center gap-1.5">
                        📥 Сформувати PDF
                    </button>
                </div>

                <div id="pdf-content" class="space-y-3 pdf-page">
                    <div class="hidden pdf-print-header p-4 text-center border-b-2 border-black mb-6">
                        <h1 class="text-xl font-bold uppercase">АКТ ПЕРЕВІРКИ ПІДРОЗДІЛУ ГУНП</h1>
                        <p class="text-sm mt-1">За результатами комплексного інспектування</p>
                        <p class="text-xs text-left mt-4"><strong>Перевіряючий:</strong> ${data.inspectorName}</p>
                        <p class="text-xs text-left"><strong>Дата та час фіксації:</strong> ${formattedDate}</p>
                    </div>
                    
                    ${itemsHtml}
                </div>
            `;
        };

        // Функція експорту в PDF за допомогою html2pdf
        window.generatePDF = function(id) {
            const data = activeReports[id];
            const element = document.getElementById('pdf-content');
            
            // Тимчасово показуємо заголовок друку
            const printHeader = element.querySelector('.pdf-print-header');
            if (printHeader) printHeader.classList.remove('hidden');

            const opt = {
                margin:       [10, 15, 10, 15], // відступи [верх, ліво, низ, право]
                filename:     `Акт_перевірки_${data.inspectorName.replace(/\s+/g, '_')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: ['css', 'legacy'], avoid: '.pdf-avoid-break' }
            };

            // Запускаємо генерацію
            html2pdf().set(opt).from(element).save().then(() => {
                // Після збереження знову ховаємо заголовок на екрані
                if (printHeader) printHeader.classList.add('hidden');
            });
        };

        // Ініціалізація завантаження при старті
        loadReports();
    </script>
</body>
</html>
